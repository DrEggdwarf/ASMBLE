server {
    listen 8080 default_server;
    server_name _;

    # Hide server version
    server_tokens off;

    # Log to stdout/stderr (Docker best practice)
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://robin-borg.dev https://www.robin-borg.dev https://aegyl.fr https://www.aegyl.fr" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (static files)
    root /app/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://robin-borg.dev https://www.robin-borg.dev https://aegyl.fr https://www.aegyl.fr" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # API Backend (proxy to FastAPI)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Limit request body size (assembly source code)
        client_max_body_size 1m;
    }

    # WebSocket
    location /api/ws {
        proxy_pass http://127.0.0.1:8000/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
