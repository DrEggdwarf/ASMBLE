# ASMBLE — Docker Compose
#
# Usage:
#   docker compose up              # Build + run
#   docker compose up --build      # Force rebuild
#   docker compose down            # Stop
#   docker compose logs -f         # Follow logs

services:
  asmble:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASMBLE_MAX_SESSIONS=5
      - ASMBLE_SESSION_IDLE_TIMEOUT=600
    # nsjail requires prctl(PR_SET_SECUREBITS) — incompatible with no-new-privileges
    # nsjail requires mount operations inside namespaces — needs AppArmor unconfined
    # Security maintained via: read_only rootfs, cap_drop ALL, minimal cap_add, nsjail isolation
    security_opt:
      - apparmor:unconfined    # nsjail needs mount/pivot_root
      - seccomp:unconfined     # nsjail needs pivot_root, mount, clone
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE     # required for GDB
      - SYS_ADMIN       # required for nsjail namespace creation
      - SETPCAP          # required for nsjail prctl(PR_SET_SECUREBITS)
      - NET_ADMIN        # required for nsjail loopback interface in network ns
      - DAC_OVERRIDE    # nginx pid/log files
      - CHOWN           # nginx temp dir ownership
      - SETUID          # supervisor → nginx worker
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:size=128M,exec
      - /run:size=8M
      - /var/log:size=32M
      - /var/lib/nginx:size=8M
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    restart: unless-stopped
