name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx pyelftools

      - name: Run tests
        run: python -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npx vite build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t asmble:ci .

      - name: Smoke test
        run: |
          docker run -d --name asmble-ci -p 8080:8080 asmble:ci
          sleep 5
          curl -sf http://localhost:8080/api/health | grep '"status":"ok"'
          docker rm -f asmble-ci
